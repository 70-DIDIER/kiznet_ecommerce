name: CI / CD — KIZNETShop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  #  CI — Tests & Build
  # ─────────────────────────────────────────
  ci:
    name: Tests & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # PHP ─────────────────────────────────
      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, bcmath, gd, xml, zip
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      # Env de test ─────────────────────────
      - name: Prepare .env for tests
        run: |
          cp .env.example .env 2>/dev/null || php -r "
            file_put_contents('.env',
              'APP_NAME=KIZNETShop\nAPP_ENV=testing\nAPP_DEBUG=true\n' .
              'APP_KEY=\nDB_CONNECTION=sqlite\nDB_DATABASE=:memory:\n' .
              'CACHE_STORE=array\nSESSION_DRIVER=array\nQUEUE_CONNECTION=sync\n'
            );
          "
          php artisan key:generate

      # Tests ───────────────────────────────
      - name: Run tests
        run: php artisan test --parallel --stop-on-failure

      # Node / Vite ─────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-assets
          path: public/build
          retention-days: 1

  # ─────────────────────────────────────────
  #  CD — Déploiement VPS (main seulement)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: built-assets
          path: public/build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            APP_DIR=/var/www/kiznet_ecommerce

            echo "── 1. Activer maintenance ──"
            cd $APP_DIR
            php artisan down --retry=30 --refresh=15 || true

            echo "── 2. Récupérer le code ──"
            git pull origin main

            echo "── 3. Dépendances PHP (prod) ──"
            composer install --no-dev --optimize-autoloader --no-interaction

            echo "── 4. Migrations ──"
            php artisan migrate --force

            echo "── 5. Caches ──"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            echo "── 6. Storage link ──"
            php artisan storage:link --force

            echo "── 7. Redémarrer les queues ──"
            php artisan queue:restart

            echo "── 8. Permissions ──"
            chmod -R 775 storage bootstrap/cache
            chown -R www-data:www-data storage bootstrap/cache

            echo "── 9. Désactiver maintenance ──"
            php artisan up

            echo "✓ Déploiement terminé."
